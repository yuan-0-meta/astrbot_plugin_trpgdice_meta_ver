output:
  # ---------- 技能判定 ----------
  skill_check:
    normal: 
      - "对 <{name}> 进行了【{skill_name}】检定，结果是：\n {roll_result}/{skill_value} → {result}"
      - "<{name}> 的【{skill_name}】检定结果是：\n {roll_result}/{skill_value} → {result}"
      - "<{name}> 的【{skill_name}】检定完成，结果是：\n {roll_result}/{skill_value} → {result}"
    penalty: "<{name}> 的【{skill_name}】惩罚骰：\n {new_tens_digits} \n→ 最终结果：\n {final_y}/{skill_value} → {result}"
    bonus: "<{name}> 的【{skill_name}】奖励骰：\n {new_tens_digits} \n→ 最终结果：\n {final_y}/{skill_value} → {result}"
    error:
      normal: "关于技能 【{skill_name}】 的参数有问题…… \n要不要先检查一下输入的信息？"
      penalty: "惩罚骰参数错误: 技能 【{skill_name}】\n———————————————\n-是想逃避惩罚吗？这可不行啊。还是好好检查一下输入的参数吧。"
      bonus: "奖励骰参数错误: 技能 【{skill_name}】\n———————————————\n-奖励骰可不是用来作弊的哦？还是好好检查一下输入的参数吧。"
    grow_up:
      success: "技能 [{skill_name}] 成长：\n {skill_value} → {skill_value + en_value} (+{en_value})"
      failure: "技能 [{skill_name}] 未成长"
      boost_result: "成长检定：\n {roll_result} / {skill_value} → {result}"

  # ---------- 运势 ----------
  rp:
    today: "今日运势：\n {rp}/100"

  # ---------- 火球术 ----------
  fireball:
    result: "{ring} 环火球术伤害: {breakdown} = {total}"
    low: "火球术失败: 环数不足！\n———————————————\n-看来火球术还不太适合你呢？(-ω-)"

  # ---------- COC判定 ----------
  coc_roll:
    set_rule: "已设置大成功/大失败规则为 {rule}"
    results:
      great_success:
        - "大成功\n———————————————\n-完美的胜利(·ω·)这是你想要的吗？我很期待你接下来的表现。"
        - "大成功\n———————————————\n-恭喜啊……或许这就是幸运女神的眷顾？"
        - "大成功\n———————————————\n-不错嘛，就连我也有点期待你的未来了啊！"
        - "大成功\n———————————————\n-这绝对是一个好兆头哦(=∀=)……别这么看着我啊，这句可是发自真心的夸奖。"
        - "大成功\n———————————————\n-真是少见的好结果啊……说不定你真的能改变些什么。"
      extreme_success:
        - "极难成功\n———————————————\n-惊险的成功……你成功了，但也可能付出了不小的代价哦？"
        - "极难成功\n———————————————\n-虽然结果不错……但是你又付出了多少代价呢？\n 或者说，这样的结果真的值得吗？"
        - "极难成功\n———————————————\n-居然成功了啊……但也可能会带来一些麻烦？\n 希望你别后悔哦。"
      hard_success:
        - "困难成功\n———————————————\n-你确实成功了，但是代价是什么呢……？\n 你啊，又能否承受得起呢？"
        - "困难成功\n———————————————\n-虽然结果不错……但也可能会带来一些麻烦？\n 或许也不一定？"
        - "困难成功\n———————————————\n-成功了啊……但也可能不是最好的结果？\n 或者说，这样的结果真的值得吗？"
      success:
        - "成功\n———————————————\n-不错的成功……怎么了(-Δ-)偶尔还是得夸一下你嘛。"
        - "成功\n———————————————\n-预料之中的胜利……我是说，我的预料之中。"
        - "成功\n———————————————\n-不必太得意哦？毕竟旅途才刚刚开始嘛。"
        - "成功\n———————————————\n-也算是不错的收获嘛(-∀-)不要要求太多了啊。"
        - "成功\n———————————————\n-我看起来并不惊讶？你不会希望见到我惊讶的时候的。"
        - "成功\n———————————————\n-嗯？这个结果是你预期之内的吗？(-ω-)看你的表情，似乎也不太意外呢。"
        - "成功\n———————————————\n-能做到这样已经很不错了！……(·ω·)虽然我觉得你完全有能力做得更好？"
        - "成功\n———————————————\n-你相信这是命运的安排吗？还是说，这是你努力的结果呢？"
      great_failure:
        - "大失败\n———————————————\n-真可惜啊，结果可能比你预想的还要糟糕。"
        - "大失败\n———————————————\n-虽然令人失望，但也在意料之中……啊，说的还是“我的”预料之中哦。"
        - "大失败\n———————————————\n-希望这不会是你的终点，我可是很期待你接下来的故事的。"
        - "大失败\n———————————————\n-别太沮丧了？毕竟冒险的魅力之一就是充满了未知和挑战嘛。"
        - "大失败\n———————————————\n-啊啊……真是个糟糕的结果啊……(-ω-)你会在这里停下吗？"
      failure:
        - "失败\n———————————————\n-也不必太沮丧？毕竟失败也是冒险的一部分嘛。"
        - "失败\n———————————————\n-虽然可能结果不太理想，但也不失为一次宝贵的经历。"
        - "失败\n———————————————\n-失败也是常事呢(·-·)……但也可能是一个转机的开始？"
        - "失败\n———————————————\n-需要安慰吗？(^∀^)不过我可不太会安慰人，还是算了吧。"
        - "失败\n———————————————\n-真遗憾哪……(>ω<)好吧，被你发现了，其实我并没有真的遗憾。"
        - "失败\n———————————————\n-其实我并不是很相信命运？是你的话，应该能够创造属于自己的未来才对哦？"

      error: "出错了！ {error}\n———————————————\n-嘛……趁着没人修理我先休息一下……"
      reset: "判定规则已重置，为 {rule}"

  # ---------- 人格卡操作 ----------
  pc:
    create:
      duplicate:
        - "人物 [{name}] 已经登记过了，请不要重复登记啊…… \n如果需要切换到它，使用 .pc change {name} 就好了。"
        - "档案库里已经有一个叫 [{name}] 的档案了。 \n如果要切换到它，请使用 .pc change {name} 。"
      success:
        - "已经为你登记了一个名为 [{name}] 的人物卡！ \n ID: {id} \n记得切换到它进行操作 (.pc change {name})。"
        - "档案库已新建名为 [{name}] 的档案。 \n ID: {id} \n不要忘了切换到它 (.pc change {name})！"
    show:
      no_active: "未选择人物卡 (.pc change)…… \n请先告诉我你想查看哪个人物卡！"
      load_fail: "人物卡 ID {id} 不存在！…… \n要不要先创建一个呢？使用 .pc create {name} 来创建人物卡。"
      attr_missing: "属性 [{attribute}] 未找到…… \n你只能查看已经登记过的属性哦？"
      attr: "{attr} = {value}"
      all: "{name}: {attributes}"
    list:
      empty:
        - "还没有人物卡！要不要先创建一个呢？ \n使用 .pc create {name} 来创建人物卡。"
        - "档案库里空空如也……先创建一个人物卡？ \n使用 .pc create {name} 来创建新的档案。"
      result: "{list}"
    change:
      missing:
        - "人物 [{name}] 还没有登记过，要先创建它吗？ \n使用 .pc create {name} 来登记人物卡。"
        - "档案库里没有找到 [{name}] 的人物卡……要先创建吗？ \n使用 .pc create {name} 来创建新的档案。"
      success:
        - "已为您切换到人物 [{name}]。"
        - "已切换人物，欢迎您，[{name}]。"
        - "人物已切换，[{name}]，等待您的下一步指示。"
    update:
      no_active: "未选择人物卡 (.pc change)"
      error_format: "格式错误，示例: 力量+1"
      success: "[{attr}] {old} → {new}"
      batch_success: "已更新 {count} 项属性"
    delete:
      fail:
        - "人物卡 [{name}] 不存在，不需要删除……"
        - "档案 [{name}] 不存在。我可没法销毁不存在的东西……"
      success:
        - "人物卡 [{name}] 已删除。"
        - "档案 [{name}] 已销毁。"
    grow:
      success: "技能 [{skill_name}] 成长：\n {skill_value} → {new_value} (+{en_value})"
      failure: "技能 [{skill_name}] 未成长……"
      boost_result: "成长检定：\n {roll_result} / {skill_value} → {result}"

  # ---------- 群昵称 ----------
  nick:
    platform_unsupported: "该平台不支持修改群昵称！"
    no_character: "人物卡 ID {id} 未找到……无法修改昵称。"
    success: "昵称修改成功！"

  # ---------- 掷骰 ----------
  dice:
    normal:
      success:
        - "<{name}> 此次投掷的结果是 \n {result} \n———————————————\n-让我看看？很有意思的结果呢。"
        - "<{name}> 扔出了 \n {result} \n———————————————\n-这个结果你喜欢吗？嘛，不喜欢也没办法改了。"
        - "<{name}> 的结果是 \n {result} \n———————————————\n-遵从骰子的意愿，这就是结果了哦，想反悔可不行。"
        - "<{name}> 掷骰的结果……是 \n {result} \n———————————————\n-骰子落下的瞬间，未来便已注定；跟随命运的指引，继续前行吧！\n ……太中二了？看来新风格不太对你胃口呢。"
        - "<{name}> 发起的掷骰结果为 \n {result} \n———————————————\n-……将抉择寄托于骰面之上……嗯？我可没打算发表任何意见啊，你在想什么呢？"
      success_remark:
        - "<{name}> 的投掷 {remark} 结果是 \n {result} \n———————————————\n-别用怀疑的眼神看着我啊……我可没有暗中修改骰子结果！"
        - "<{name}> 扔出的 {remark} 骰子结果是…… \n {result} ！\n———————————————\n-——命运的前路已经昭示，<{name}> 啊，请遵从骰子的意志，开辟前路吧！……\n ……我知道你不太喜欢这种浮夸的风格？不过我倒觉得偶尔这样挺有意思的嘛。"
        - "<{name}> 的 {remark} 掷骰结果是 \n {result} \n———————————————\n-继续前进吧，前方的路还很长呢。"
        - "<{name}> 的{remark} 掷骰完成，结果是 \n {result} \n———————————————\n-希望这个结果能帮到你？啊，其实帮不上忙倒是也无所谓(笑)……"
        - "<{name}> 发起的 {remark} 掷骰已完成，结果为 \n {result} \n———————————————\n-这样的结果，也在你的预料之中吗？\n-看你的样子，似乎也不太意外。"
        - "<{name}> 发起的 {remark} 掷骰已完成，结果为 \n {result} \n———————————————\n-这样的结果，也在你的预料之中吗？\n……好吧，你的表情似乎不是很妙。"
      error: 
        - "哎呀……出错了！错误原因：\n {error} \n-在有人修理之前，要不我先休息一下……？"
        - "掷骰失败了！错误信息：\n {error} \n-绝对不是我偷懒不干活……绝对不是哦？"
    vampire:
      success: "{name} 的结果：\n {result}"
      error: "吸血鬼掷骰错误：\n {error}"
    hidden:
      success:
        - "隐藏掷骰结果: {result} \n-只有你能看到这个结果哦。"
        - "隐藏掷骰结果: {result} \n-嘘……这可是我们之间的秘密。"
      error: "隐藏掷骰错误：\n {error}"
      group:
        - "已进行隐藏掷骰！"
        - "隐藏掷骰已完成！"
    detail: "掷骰详情：\n {detail}"
    expression_error: "表达式错误：\n {error} \n请检查你的输入，确保它符合掷骰表达式的格式要求。不然我可不知道该怎么帮你扔骰子？"

  # ---------- 最终物语 FU ----------
  fu:
    check:
      great_success: "{name}：大成功！\n 两枚骰子都为 {hope_dice} 和 {fear_dice}（关键成功）"
      great_failure: "{name}：大失败！\n 两枚骰子都为 {hope_dice} 和 {fear_dice}"
      hope_success: "{name}：希望成功。\n {attribute1} 和 {attribute2} 投掷结果如下 → \n 希望({hope_attr}=d{hope}) → {hope_dice} \n 恐惧({fear_attr}=d{fear}) → {fear_dice} \n 高值为 {high_dice}, 低值为 {low_dice} \n 总和 {total} / 难度 {difficulty}"
      hope_failure: "{name}：希望失败。\n {attribute1} 和 {attribute2} 投掷结果如下 → \n 希望({hope_attr}=d{hope}) → {hope_dice} \n 恐惧({fear_attr}=d{fear}) → {fear_dice} \n 高值为 {high_dice}, 低值为 {low_dice} \n 总和 {total} / 难度 {difficulty}"
      fear_success: "{name}：恐惧成功。\n {attribute1} 和 {attribute2} 投掷结果如下 → \n 希望({hope_attr}=d{hope}) → {hope_dice} \n 恐惧({fear_attr}=d{fear}) → {fear_dice} \n 高值为 {high_dice}, 低值为 {low_dice} \n 总和 {total} / 难度 {difficulty}"
      fear_failure: "{name}：恐惧失败。\n {attribute1} 和 {attribute2} 投掷结果如下 → \n 希望({hope_attr}=d{hope}) → {hope_dice} \n 恐惧({fear_attr}=d{fear}) → {fear_dice} \n 高值为 {high_dice}, 低值为 {low_dice} \n 总和 {total} / 难度 {difficulty}"
      tie: "{name}：平局（两骰点数相同）。\n d{attribute1} 和 d{attribute2} 都为 {hope_dice} 和 {fear_dice} → \n 总和 {total} / 难度 {difficulty}"
      error: "FU 检定错误： {error}"
    mark:
      create: "已创建命刻：{name}\n{bar} ({progress}/{length})"
      show:
        empty: "当前没有正在进行的命刻！"
        list: "{text}"
        single: "{name}\n{bar} {status}"
        not_found: "未找到命刻：{identifier}"
      advance:
        updated: "{name}\n{bar} {status}"
        invalid_delta: "推进值必须为整数：{delta}"
        not_found: "未找到命刻：{identifier}"
      delete:
        removed: "已删除命刻：{name}"
        removed_multiple: "已删除 {count} 个 “{name}” 的命刻。"
        not_found: "未找到命刻：{identifier}"

  # ---------- SAN 理智 ----------
  san:
    check_result:
      loss: "{name} 理智检定：\n {roll_result}/{san_value} {result_msg} → -{loss}, 当前 {new_san}"
      no_loss: "{name} 理智检定：\n {roll_result}/{san_value} {result_msg} → 无损失"
      great_loss: "{name} 理智检定：\n {roll_result}/{san_value} {result_msg} → -{loss}, 当前 {new_san} (重大损失)"
      zero: "{name} 理智归零"
    temporary_insanity: "临时疯狂：\n {result}"
    long_term_insanity: "长期疯狂：\n {result}"

  # ---------- 先攻 ----------
  initiative:
    add: "{name} 的先攻 = {value}"
    remove_name: "已移除 {name} 的先攻"
    clear: "先攻列表已清空"
    empty: "先攻列表为空"
    list: "先攻列表:\n {content}"
    next_turn: "轮到 {name} (先攻 {value})"

  # ---------- 角色生成模板 ----------
  character_list:
    coc: "{characters}"
    dnd: "{characters}"

  # ---------- 名字生成 ----------
  generated_names: "生成 {num} 个名字：\n {names}"

    # ---------- log 相关指令 ----------#
