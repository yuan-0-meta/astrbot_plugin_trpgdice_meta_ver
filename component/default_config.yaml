output:
  # ---------- 技能判定 ----------
  skill_check:
    normal: 
      - "已经对 <{name}> 进行了【{skill_name}】检定，结果是 {roll_result}/{skill_value} → {result}"
      - "<{name}> 的【{skill_name}】检定结果是 {roll_result}/{skill_value} → {result}"
      - "【{skill_name}】检定完成，<{name}> 的结果是 {roll_result}/{skill_value} → {result}"
    penalty: "<{name}> 惩罚骰: {new_tens_digits} → 最终结果: {final_y}/{skill_value} → {result}"
    bonus: "<{name}> 奖励骰: {new_tens_digits} → 最终结果: {final_y}/{skill_value} → {result}"
    error:
      normal: "档案中没有找到技能 【{skill_name}】 ……要不要先检查一下人物卡的信息？"
      penalty: "惩罚骰参数错误: 技能 {skill_name}"
      bonus: "奖励骰参数错误: 技能 {skill_name}"
    grow_up:
      success: "技能 [{skill_name}] 成长: {skill_value} → {skill_value + en_value} (+{en_value})"
      failure: "技能 [{skill_name}] 未成长"
      boost_result: "成长检定: {roll_result} / {skill_value} → {result}"

  # ---------- 运势 ----------
  rp:
    today: "今日运势: {rp}/100"

  # ---------- 火球术 ----------
  fireball:
    result: "{ring} 环火球术伤害: {breakdown} = {total}"
    low: "火球术失败: 环数不足"

  # ---------- COC判定 ----------
  coc_roll:
    set_rule: "已设置大成功/大失败规则为 {rule}"
    results:
      great_success: 
        - "大成功\n这样的结果，正是你所需要的吗？我很期待你接下来的表现。"
        - "大成功\n恭喜啊……或许这就是幸运女神的眷顾？"
        - "大成功\n不错嘛，就连我也有点期待你的未来了啊！"
        - "大成功\n这绝对是一个好兆头哦！……别这么看着我啊，这句可是发自真心的夸奖。"
        - "大成功\n真是少见的好结果啊……说不定你真的能改变些什么。"
      extreme_success: 
        - "极难成功\n惊险的成功……你成功了，但也可能付出了不小的代价哦？"
        - "极难成功\n虽然结果不错……但是你又付出了多少代价呢？\n或者说，这样的结果真的值得吗？"
        - "极难成功\n居然成功了啊……但也可能会带来一些麻烦？\n或者以你的聪明才智……也不一定？"
      hard_success: 
        - "困难成功\n你确实成功了，但是代价是什么呢……？\n你啊，又能否承受得起呢？"
        - "困难成功\n虽然结果不错……但也可能会带来一些麻烦？\n或许也不一定？"
        - "困难成功\n成功了啊……但也可能会带来一些麻烦？\n或者以你的聪明才智，倒也能化险为夷？"
      success: 
        - "成功\n不错的成功……怎么了，偶尔还是得夸一下你嘛。"
        - "成功\n预料之中的胜利……我是说，我的预料之中。"
        - "成功\n不必太得意哦？毕竟旅途才刚刚开始嘛。"
        - "成功\n虽然结果可能并不完全如你所愿，但也算是不错的开始了？"
        - "成功\n我看起来并不惊讶？你不会希望见到我惊讶的时候的。"
      great_failure: 
        - "大失败\n真可惜啊，结果可能比你预想的还要糟糕。"
        - "大失败\n虽然令人失望，但也在意料之中……啊，说的还是“我的”预料之中哦。"
        - "大失败\n希望这不会是你的终点，我可是很期待你接下来的故事的。"
        - "大失败\n别太沮丧了？毕竟冒险的魅力之一就是充满了未知和挑战嘛。"
        - "大失败\n啊啊……真是个糟糕的结果啊……你会在这里停下吗？"
      failure: 
        - "失败\n也不必太沮丧？毕竟失败也是冒险的一部分嘛。"
        - "失败\n虽然可能结果不太理想，但也不失为一次宝贵的经历。"
        - "失败\n失败也是常事呢……但也可能是一个转机的开始？"
        - "失败\n需要安慰吗？不过我可不太会安慰人，还是算了吧。"
        - "失败\n真遗憾哪……好吧，被你发现了，其实我并没有真的遗憾。"

      error: "出错了！ {error}\n嘛……趁着没人修理我先休息一下……"
      reset: "判定规则已重置，为 {rule}"

  # ---------- 人格卡操作 ----------
  pc:
    create:
      duplicate:
        - "人物 [{name}] 已经登记过了，请不要重复登记啊……如果需要切换到它，使用 .pc change {name} 就好了。"
        - "档案库里已经有一个叫 [{name}] 的人物卡了，如果要切换到它，请使用 .pc change {name} 。"
      success:
        - "已经为你登记了一个名为 [{name}] 的人物卡，(ID: {id})，记得切换到它进行操作 (.pc change {name})。"
        - "档案库已新建名为 [{name}] 的人物卡 (ID: {id})，不要忘了切换到它 (.pc change {name})！"
    show:
      no_active: "未选择人物卡 (.pc change)"
      load_fail: "人物卡 ID {id} 不存在"
      attr_missing: "属性 [{attribute}] 未找到"
      attr: "{attr} = {value}"
      all: "{name}: {attributes}"
    list:
      empty: "无人物卡"
      result: "{list}"
    change:
      missing: 
        - "人物 [{name}] 还没有登记过，要先创建它吗？使用 .pc create {name} 来登记人物卡。"
        - "档案库里没有找到 [{name}] 的人物卡……要先创建吗？使用 .pc create {name} 来创建新的档案。"
      success: 
        - "已为您切换到人物 [{name}]。"
        - "已切换人物，欢迎您，[{name}]。"
        - "人物已切换，[{name}]，等待您的下一步指示。"
    update:
      no_active: "未选择人物卡 (.pc change)"
      error_format: "格式错误，示例: 力量+1"
      success: "[{attr}] {old} → {new}"
      batch_success: "已更新 {count} 项属性"
    delete:
      fail: "人物卡 [{name}] 不存在"
      success: "人物卡 [{name}] 已删除"
    grow:
      success: "技能 [{skill_name}] 成长: {skill_value} → {new_value} (+{en_value})"
      failure: "技能 [{skill_name}] 未成长"
      boost_result: "成长检定: {roll_result} / {skill_value} → {result}"

  # ---------- 群昵称 ----------
  nick:
    platform_unsupported: "该平台不支持修改群昵称"
    no_character: "人物卡 ID {id} 未找到"
    success: "昵称修改成功"

  # ---------- 掷骰 ----------
  dice:
    normal:
      success:
        - "让我看看…… <{name}> 此次投掷的结果是 {result} 。"
        - "咔哒咔哒……掷骰完成， <{name}> 扔出了 {result} 点。"
        - "骰子停下了…… <{name}> 的结果是 {result} 。\n骰子已经决定了命运，接下来就看你的行动了哦。"
        - "<{name}> 掷骰的结果……是 {result} 。\n无论结果如何，都请好好利用眼前的机会。"
        - "由 <{name}> 发起的掷骰完成了，这次的结果是 {result} 呢。\n这样的结果，是你所期望的吗？"
      success_remark:
        - "扔一个 {remark} 骰子吗…… <{name}> 的投掷结果是 {result} 哦。"
        - "<{name}> 扔出的 {remark} 骰子结果是…… {result} ！"
        - "{remark} 骰子已经掷好了, <{name}> 的结果是 {result} 。\n继续前进吧，前方的路还很长呢。"
        - "……<{name}> 要扔一个 {remark} 骰子吗？ 掷骰完成了，结果是 {result} 哦。\n希望这个结果能帮到你？啊，其实帮不上忙倒是也无所谓(笑)……"
        - "由 <{name}> 发起的 {remark} 掷骰已完成， 结果是 {result} 。\n这样的结果，也在你的预料之中吗？"
      error: 
        - "哎呀……出错了！错误原因: {error}\n在有人修理之前，要不我先休息一下……？"
        - "掷骰失败了！错误信息: {error} \n绝对不是我偷懒不干活……绝对不是哦？"
    vampire:
      success: "{name} 的结果: {result}"
      error: "吸血鬼掷骰错误: {error}"
    hidden:
      success: 
        - "隐藏掷骰结果: {result}\n只有你能看到这个结果哦……"
        - "隐藏掷骰结果: {result}\n嘘……这可是我们之间的秘密！"
      error: "隐藏掷骰错误: {error}"
      group: "已进行隐藏掷骰"
    detail: "掷骰详情: {detail}"
    expression_error: "表达式错误: {error}\n请检查你的输入，确保它符合掷骰表达式的格式要求。"

  # ---------- 最终物语 FU ----------
  fu:
    check:
      great_success: "{name}：大成功！两枚骰子为 {d1} 和 {d2}（关键成功）"
      great_failure: "{name}：大失败！两枚骰子都是 1"
      hope_success: "{name}：希望成功。{attribute1}({attribute2}) 掷出 {d1},{d2} → 希望({hope_attr}={hope})，恐惧({fear_attr}={fear})，总和 {total} / 难度 {difficulty}"
      hope_failure: "{name}：希望失败。{attribute1}({attribute2}) 掷出 {d1},{d2} → 希望({hope_attr}={hope})，恐惧({fear_attr}={fear})，总和 {total} / 难度 {difficulty}"
      fear_success: "{name}：恐惧成功。{attribute1}({attribute2}) 掷出 {d1},{d2} → 希望({hope_attr}={hope})，恐惧({fear_attr}={fear})，总和 {total} / 难度 {difficulty}"
      fear_failure: "{name}：恐惧失败。{attribute1}({attribute2}) 掷出 {d1},{d2} → 希望({hope_attr}={hope})，恐惧({fear_attr}={fear})，总和 {total} / 难度 {difficulty}"
      tie: "{name}：平局（两骰点数相同）。{attribute1}({attribute2}) 掷出 {d1},{d2} → 总和 {total} / 难度 {difficulty}"
      error: "FU 检定错误: {error}"

  # ---------- SAN 理智 ----------
  san:
    check_result:
      loss: "{name} 理智检定: {roll_result}/{san_value} {result_msg} → -{loss}, 当前 {new_san}"
      no_loss: "{name} 理智检定: {roll_result}/{san_value} {result_msg} → 无损失"
      great_loss: "{name} 理智检定: {roll_result}/{san_value} {result_msg} → -{loss}, 当前 {new_san} (重大损失)"
      zero: "{name} 理智归零"
    temporary_insanity: "临时疯狂: {result}"
    long_term_insanity: "长期疯狂: {result}"

  # ---------- 先攻 ----------
  initiative:
    add: "{name} 的先攻 = {value}"
    remove_name: "已移除 {name} 的先攻"
    clear: "先攻列表已清空"
    empty: "先攻列表为空"
    list: "先攻列表:\n{content}"
    next_turn: "轮到 {name} (先攻 {value})"

  # ---------- 角色生成模板 ----------
  character_list:
    coc: "{characters}"
    dnd: "{characters}"

  # ---------- 名字生成 ----------
  generated_names: "生成 {num} 个名字: {names}"

    # ---------- log 相关指令 ----------#
  log:
    no_active_session: "当前没有正在进行的日志会话。"
    message_added: "消息已记录到当前日志。"
    unfinished_session: "检测到未完成的日志『{session_name}』，是否继续？"
    new_session: "新日志『{session_name}』已创建。"
    session_not_found: "日志『{session_name}』不存在。"
    session_finished: "日志『{session_name}』已结束并归档。"
    session_active: "日志『{session_name}』仍在进行中。"
    session_resumed: "日志『{session_name}』已恢复。"
    no_paused_session: "没有已暂停的日志。"
    session_paused: "日志『{session_name}』已暂停。"
    no_unfinished_session: "没有未完成的日志。"
    session_halted: "日志『{session_name}』已中止。"
    session_line: "▸ {session_name} · {start_time} · {status} · {message_count} 条记录"
    no_sessions: "尚无任何日志记录。"
    session_deleted: "日志『{session_name}』已删除。"
    session_exported: "日志『{session_name}』已导出，文件名：{file_name}\n导出结果地址：{result_website}"
    delete_error: "删除日志失败。正确用法：.log del <日志名>"

  setting : 
    website : ...
