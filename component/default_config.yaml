output:
  # ---------- 技能判定 ----------
  skill_check:
    normal: 
      - "对 <{name}> 进行了【{skill_name}】检定，结果是：\n {roll_result}/{skill_value} → {result}"
      - "<{name}> 的【{skill_name}】检定结果是：\n {roll_result}/{skill_value} → {result}"
      - "<{name}> 的【{skill_name}】检定完成，结果是：\n {roll_result}/{skill_value} → {result}"
    penalty: "<{name}> 的【{skill_name}】惩罚骰：\n {new_tens_digits} \n→ 最终结果：\n {final_y}/{skill_value} → {result}"
    bonus: "<{name}> 的【{skill_name}】奖励骰：\n {new_tens_digits} \n→ 最终结果：\n {final_y}/{skill_value} → {result}"
