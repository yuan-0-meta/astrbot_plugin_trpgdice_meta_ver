      hard_success:
        - "困难成功\n———————————————\n-不错嘛，看得出来你知道自己在做什么。"
        - "困难成功\n———————————————\n-比平时精彩呢，还挺让人印象深刻的嘛。"
        - "困难成功\n———————————————\n-这个结果……\n (´-ω-`)虽然我一直觉得你有能力做到这样，但还是挺让人高兴的呢。"
        - "困难成功\n———————————————\n-这次的结果还挺好啊……\n (´-ω-`)看来<{name}>你对这个技能还是挺熟练的嘛。"
        - "困难成功\n———————————————\n-这次可比你一直以来的表现都要好看些呢。\n 你一直在进步，我看得出来。"
      success:
        - "成功\n———————————————\n-不错的成功。\n ……怎么了(´･ω･`)偶尔还是得夸一下你嘛。"
        - "成功\n———————————————\n-预料之中的胜利。\n ……(´·ω‹`)我是说，我的预料之中。"
        - "成功\n———————————————\n-也算是不错的收获。\n 嘛……(´-ωก̀ )不要要求太多了啊。"
        - "成功\n———————————————\n-我看起来并不惊讶？\n ……(-ω-)你不会希望见到我惊讶的时候的。"
        - "成功\n———————————————\n-嗯？这个结果是你预期之内的吗？\n 看你的表情，似乎也不太意外呢。"
        - "成功\n———————————————\n-能做到这样已经很不错了！(´･ω･`)\n 虽然我觉得你完全有能力做得更好？"
        - "成功\n———————————————\n-你相信这是命运的安排吗？\n 还是说，这是你努力的结果呢？"
        - "成功\n———————————————\n-嗯……正常发挥。\n ……正常到我都不知道该说什么了——要不你起个话题？"
        - "成功\n———————————————\n-要是每次都能这样，你们大概会无聊到生锈。\n (´-ω-`)不过我见过太多成功和失败了，能像你这样平平淡淡地赢一次，其实也挺难得的。"
        - "成功\n———————————————\n-标准的成功。\n ——(´-ωก̀ )标准到我觉得可以把这段塞进教科书里。"
        - "成功\n———————————————\n-好——过了。接下来是继续，还是先休息一下？\n 我建议休息，因为我想去倒杯茶。(´-ω-`)"
      great_failure:
        - "大失败\n———————————————\n-……咳。(´-ω-`)看来命运偶尔也想看个笑话呢。"
        - "大失败\n———————————————\n-哎呀……(´;ω;`)这次真的不是我。我保证哦？"
        - "大失败\n———————————————\n-（戳戳骰子）喂，给<{name}>点面子嘛。\n ……你看，它也不听我的。"
        - "大失败\n———————————————\n-这个结果……(´-ω-`)我也不知道该说什么好了。\n 总之，自求多福，<{name}>。"

      failure:
        - "失败\n———————————————\n-虽然令人失望，但倒也在意料之中。\n ……啊，(´-ωก̀ )说的还是“我的”预料之中哦。"
        - "失败\n———————————————\n-不太理想的结果啊……\n (-ω-)你会在这里停下吗？"
        - "失败\n———————————————\n-失败了，但没完全失败……\n ——起码你收获了……嗯，一次经验？(-ω-)"
        - "失败\n———————————————\n-失败了呢……\n 你该不会想让我破例重扔吧？(´·ω-`)"
        - "失败\n———————————————\n-失败也是常事呢，正常正常。\n ……但也可能是一个转机的开始？(´;ω;`)不要太消沉了啊。"
        - "失败\n———————————————\n-需要安慰吗？\n ……不过我可不太会安慰人，所以还是算了吧。(´ω`)"
        - "失败\n———————————————\n-哎呀！没能成功。\n (´-ω-`)不过反正是骰子动的手，和我没关系……"
        - "失败\n———————————————\n-结果不太好……虽然也不算太糟糕。\n 不如下次扔之前拜一下骰子？不过我也不知道有没有用哦。"
        - "失败\n———————————————\n-真遗憾哪……\n (>ω<)好吧，被你发现了，其实我并没有真的遗憾。"
        - "失败\n———————————————\n-其实我并不是很相信命运？\n 是你的话，应该能够创造属于自己的未来才对？"
        - "失败\n———————————————\n-虽然结果不理想，但至少你尝试了。\n (´-ω-`)继续加油吧，<{name}>。"

      error: 
      - "出错了！ {error}\n———————————————\n-（敲敲）喂——有人在吗？代码好像打了个喷嚏。"
      - "出错了！ {error}\n———————————————\n-不是我的问题，也不是你的。可能是……代码的锅？\n (´-ω-`)要不我们先休息一下，等它自己好起来？"
      - "出错了！ {error}\n———————————————\n-嘛……趁着没人修理我先休息一下……"
      reset: "判定规则已重置，为 {rule}"

  # ---------- 人格卡操作 ----------
  pc:
    create:
      duplicate:
        - "人物 [{name}] 已经登记过了，请不要重复登记啊…… \n如果需要切换到它，使用 .pc change {name} 就好了。"
