      bonus: "奖励骰参数错误: 技能 【{skill_name}】\n———————————————\n-奖励骰可不是用来作弊的哦？还是好好检查一下输入的参数吧。"
    grow_up:
      success: "技能 [{skill_name}] 成长：\n {skill_value} → {skill_value + en_value} (+{en_value})"
      failure: "技能 [{skill_name}] 未成长"
      boost_result: "成长检定：\n {roll_result} / {skill_value} → {result}"

  # ---------- 运势 ----------
  rp:
    today: 
    - "今日运势：\n {rp}/100\n———————————————\n-喏。今天的运势。建议别太当真——虽然你大概已经截图了。"
    - "今日运势：\n {rp}/100\n———————————————\n-无论运势如何，都祝你今天过得愉快(´-ω-`)"
    - "今日运势：\n {rp}/100\n———————————————\n-运势只是个数字，真正的幸运还是要靠自己的努力，对吧？"
    - "今日运势：\n {rp}/100\n———————————————\n-希望你今天能有个好心情？不要太在意运势的高低了嘛。"
    - "今日运势：\n {rp}/100\n———————————————\n-无论运势高低，都要好好照顾自己哦？( ´･ω･)ﾉ"

  # ---------- 火球术 ----------
  fireball:
    result: "{ring} 环火球术伤害: {breakdown} = {total}"
    low: "火球术失败: 环数不足！\n———————————————\n-看来火球术还不太适合你呢？(-ω-)\n 不如先从烛光术开始？或者……蜡烛？"

