        - "极难成功\n———————————————\n-不错的成功，今天你的运气似乎挺不错呢。\n 哎呀，运气也是实力的一部分嘛。"
        - "极难成功\n———————————————\n-居然真的能做到这样……\n (´-ω-`)我开始对你有点兴趣了，<{name}>。"
        - "极难成功\n———————————————\n-继续保持这样的表现吧！\n (´･ω･`)说不定下次，世界真的会因你而改变哦？"
