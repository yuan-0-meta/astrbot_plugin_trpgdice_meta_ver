      empty:
        - "还没有人物卡！要不要先创建一个呢？ \n使用 .pc create {name} 来创建人物卡。"
        - "档案库里空空如也……先创建一个人物卡？ \n使用 .pc create {name} 来创建新的档案。"
      result: "{list}"
    change:
      missing:
        - "人物 [{name}] 还没有登记过，要先创建它吗？ \n使用 .pc create {name} 来登记人物卡。"
        - "档案库里没有找到 [{name}] 的人物卡……要先创建吗？ \n使用 .pc create {name} 来创建新的档案。"
      success:
        - "已为您切换到人物 [{name}]。"
        - "已切换人物，欢迎您，[{name}]。"
        - "人物已切换，[{name}]，等待您的下一步指示。"
    update:
      no_active: "未选择人物卡 (.pc change)"
      error_format: "格式错误，示例: 力量+1"
      success: "[{attr}] {old} → {new}"
      batch_success: "已更新 {count} 项属性"
    delete:
      fail:
        - "人物卡 [{name}] 不存在，不需要删除……"
        - "档案 [{name}] 不存在。我可没法销毁不存在的东西……"
      success:
        - "人物卡 [{name}] 已删除。"
        - "档案 [{name}] 已销毁。"
    grow:
      success: "技能 [{skill_name}] 成长：\n {skill_value} → {new_value} (+{en_value})"
      failure: "技能 [{skill_name}] 未成长……"
      boost_result: "成长检定：\n {roll_result} / {skill_value} → {result}"

  # ---------- 群昵称 ----------
  nick:
    platform_unsupported: "该平台不支持修改群昵称！"
    no_character: "人物卡 ID {id} 未找到……无法修改昵称。"
    success: "昵称修改成功！"

  # ---------- 掷骰 ----------
  dice:
    normal:
      success:
        - "<{name}> 此次投掷的结果是 \n {result} \n———————————————\n-让我看看？很有意思的结果呢。"
        - "<{name}> 扔出了 \n {result} \n———————————————\n-这个结果你喜欢吗？嘛，不喜欢也没办法改了。"
        - "<{name}> 的结果是 \n {result} \n———————————————\n-遵从骰子的意愿，这就是结果了哦，想反悔可不行。"
        - "<{name}> 掷骰的结果……是 \n {result} \n———————————————\n-骰子落下的瞬间，未来便已注定；跟随命运的指引，继续前行吧！\n ……太中二了？看来新风格不太对你胃口呢。(´-ω-`)"
        - "<{name}> 发起的掷骰结果为 \n {result} \n———————————————\n-……将抉择寄托于骰面之上……嗯？我可没打算发表任何意见啊，你在想什么呢？"
      success_remark:
        - "<{name}> 的投掷 {remark} 结果是 \n {result} \n———————————————\n-别用怀疑的眼神看着我啊……我可没有暗中修改骰子结果！"
        - "<{name}> 扔出的 {remark} 骰子结果是…… \n {result} ！\n———————————————\n-——命运的前路已经昭示，<{name}> 啊，请遵从骰子的意志，开辟前路吧！……\n ……我知道你不太喜欢这种浮夸的风格？不过我倒觉得偶尔这样挺有意思的嘛。"
        - "<{name}> 的 {remark} 掷骰结果是 \n {result} \n———————————————\n-继续前进吧，前方的路还很长呢。"
        - "<{name}> 的{remark} 掷骰完成，结果是 \n {result} \n———————————————\n-希望这个结果能帮到你？啊，其实帮不上忙倒是也无所谓(笑)……"
        - "<{name}> 发起的 {remark} 掷骰已完成，结果为 \n {result} \n———————————————\n-这样的结果，也在你的预料之中吗？\n-看你的样子，似乎也不太意外。"
        - "<{name}> 发起的 {remark} 掷骰已完成，结果为 \n {result} \n———————————————\n-这样的结果，也在你的预料之中吗？\n……好吧，你的表情似乎不是很妙。"
      error: 
        - "哎呀……出错了！错误原因：\n {error} \n-在有人修理之前，要不我先休息一下……？"
        - "掷骰失败了！错误信息：\n {error} \n-绝对不是我偷懒不干活……绝对不是哦？"
    vampire:
      success: "{name} 的结果：\n {result}"
      error: "吸血鬼掷骰错误：\n {error}"
    hidden:
      success:
        - "隐藏掷骰结果: {result} \n-只有你能看到这个结果哦。"
        - "隐藏掷骰结果: {result} \n-嘘……这可是我们之间的秘密。"
